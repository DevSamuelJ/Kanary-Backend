name: Deploy Automático para VPS

on:
  push:
    branches: [ "main" ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
    # 1. Baixa o código do repositório no servidor do GitHub
    - name: Checkout do código
      uses: actions/checkout@v4

    # 2. Configura o ambiente Java (JDK 17) para compilar
    - name: Configurar JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: 'maven'

    # 3. Compila o projeto e gera o arquivo .jar (ignorando os testes para ir mais rápido)
    - name: Build com Maven
      run: mvn clean package -DskipTests

    # 4. Envia o arquivo .jar gerado para dentro da sua VPS via SCP
    - name: Enviar .jar para a VPS
      uses: appleboy/scp-action@v0.1.7
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        source: "target/*.jar"
        target: "~/bancos-dados"
        strip_components: 1

    # 5. Conecta via SSH para rodar a aplicação na VPS
    - name: Executar comandos na VPS via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.SSH_PRIVATE_KEY }}
        script: |
          cd ~/bancos-dados
          
          # Criar ou atualizar o arquivo .env com as credenciais de produção
          echo "DB_HOST=mysql" > .env
          echo "DB_NAME=db_estudos_mysql" >> .env
          echo "DB_USERNAME=root" >> .env
          echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
          
          # Para o container antigo da API se ele existir, limpa o cache e sobe o novo jar
          docker compose down api_spring --remove-orphans
          docker compose up -d api_spring